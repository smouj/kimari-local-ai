# Evaluation settings
dataset_dir: eval/kimari_private_v1
subset_size: 10
temperature: 0.2
max_tokens: 256
seed: 42

# Safety settings
raw_outputs_commit_allowed: false
public_benchmark_allowed: false
manual_review_required: true
gate_state: BLOCKED

# Scoring
score_status: not_scored
scoring_method: manual_review

# Phases
phases:
  - name: smoke
    subset_size: 5
    candidates: all
    description: Quick smoke test with 5 prompts per model

  - name: subset10
    subset_size: 10
    candidates: all
    description: Subset10 evaluation for all 4 candidates

  - name: subset30
    subset_size: 30
    candidates: top_2
    description: Subset30 for top 2 candidates from subset10