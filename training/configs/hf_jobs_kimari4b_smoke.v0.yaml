# Kimari-4B HF Jobs Smoke Test Configuration
# v0 — minimal smoke test, NO training, NO adapter, NO upload
# Purpose: verify HF Jobs can run, detect GPU, install deps, and exit cleanly.

run_id: "kimari4b-hf-jobs-smoke-v0"

# ── Job Settings ────────────────────────────────────────────────
# This is a SMOKE TEST. It runs a simple Python script that:
# 1. Prints environment info
# 2. Checks GPU/CUDA availability
# 3. Verifies torch import
# 4. Exits with code 0
# It does NOT train, does NOT create an adapter, does NOT upload anything.

flavor: "a10g-small"  # $1.00/hour — cheapest GPU flavor
timeout_minutes: 5     # Maximum 5 minutes to limit cost

# ── Safety Flags ────────────────────────────────────────────────
# ALL of these must be false. No script should change them automatically.
safety:
  training_performed: false
  adapter_generated: false
  hf_upload_performed: false
  push_to_hub: false
  gguf_export: false
  gate_state: "BLOCKED"
  manual_review_required: true

# ── Smoke Command ───────────────────────────────────────────────
# The command that runs inside the HF Job.
# Simple: print env info, check GPU, verify torch, exit 0.
# This is intentionally minimal to limit cost.
smoke_command: |
  python3 -c "
  import sys, os, json
  result = {
      'smoke': True,
      'python': sys.version,
      'platform': sys.platform,
  }
  try:
      import torch
      result['torch_version'] = torch.__version__
      result['cuda_available'] = torch.cuda.is_available()
      if torch.cuda.is_available():
          result['gpu_name'] = torch.cuda.get_device_name(0)
          result['gpu_count'] = torch.cuda.device_count()
          result['cuda_version'] = torch.version.cuda
          props = torch.cuda.get_device_properties(0)
          result['gpu_vram_gb'] = round(props.total_mem / (1024**3), 1)
      else:
          result['gpu_name'] = None
          result['gpu_count'] = 0
  except ImportError:
      result['torch_version'] = None
      result['cuda_available'] = False
  result['training_performed'] = False
  result['adapter_generated'] = False
  result['gate_state'] = 'BLOCKED'
  print(json.dumps(result, indent=2))
  "

# ── Output ───────────────────────────────────────────────────────
# Smoke results are captured from stdout, not uploaded.
output:
  summary_dir: "training/results"
  summary_file: "training/results/hf_jobs_smoke_summary.json"

# ── Cost Estimate ───────────────────────────────────────────────
# a10g-small: $1.00/hour, max 5 minutes ≈ $0.08
# This is a ONE-TIME cost to verify HF Jobs access.
cost_estimate:
  flavor: "a10g-small"
  cost_per_hour_usd: 1.00
  max_runtime_minutes: 5
  estimated_cost_usd: 0.08