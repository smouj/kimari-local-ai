# Kimari-4B HF Jobs Micro SFT Real Configuration
# v0 — first real micro SFT run on HF Jobs
# SAFETY: All release/upload flags are FALSE. Gate is BLOCKED.

run_id: "kimari4b-hfjobs-micro-sft-v0"

# ── Base Model ──────────────────────────────────────────────────
base_model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  license: "Apache-2.0"
  params_billions: 1.5
  reason: "Cheaper first pipeline smoke; validate training before investing in 3B"

# ── Dataset ─────────────────────────────────────────────────────
dataset:
  name: "kimari-fit-v0"
  path: "dataset/build/kimari-fit-v0/sft_micro.jsonl"
  format: "jsonl"
  fields: ["prompt", "response"]
  description: "72 curated examples: Spanish technical, CUDA/GPU, Python/Bash, Kimari API"
  record_count: 72
  hash: "f8ce140b5e2e127e4324f3a7c4785480"
  private_data: false
  tokens_or_secrets: false

# ── HF Jobs Settings ───────────────────────────────────────────
hf_jobs:
  flavor: "a10g-small"         # $1.00/hour, NVIDIA A10G 24GB
  timeout_minutes: 20            # Max 20 minutes to limit cost
  docker_image: "pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel"
  estimated_cost_usd: 0.35      # 20 min * $1.00/hr ≈ $0.35

# ── LoRA Config ──────────────────────────────────────────────────
lora:
  r: 8
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Training Hyperparameters ────────────────────────────────────
training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_steps: 10                # Short run for first micro SFT (pipeline validation)
  max_seq_length: 512
  logging_steps: 5
  save_steps: 10
  save_total_limit: 2
  fp16: true
  bf16: false
  seed: 42

# ── Output ──────────────────────────────────────────────────────
output:
  dir: "training/adapters/kimari4b-hfjobs-micro-sft-v0"
  manifest_file: "training/adapters/kimari4b-hfjobs-micro-sft-v0/manifest.json"

# ── Safety Flags ────────────────────────────────────────────────
# ALL false. No script should change these automatically.
safety:
  training_performed: true      # This IS a training run, but private
  adapter_generated: true       # Adapter WILL be generated, but NOT committed
  adapter_committed: false       # NEVER commit adapter to git
  hf_upload_performed: false    # NEVER upload to Hugging Face
  push_to_hub: false            # NEVER push to hub
  gguf_export: false            # NO GGUF export
  report_to: "none"             # NO wandb/tensorboard
  preview_gate_state: "BLOCKED"

# ── Manual Review ────────────────────────────────────────────────
manual_review_required: true
auto_gate_transition: false