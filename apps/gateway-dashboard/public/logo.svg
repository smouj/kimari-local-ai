  <path d="M400 340 L420 340 L420 310" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <path d="M100 180 L70 180 L70 220" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
