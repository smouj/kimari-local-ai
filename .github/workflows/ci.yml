name: CI
on: [push, pull_request]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r cli/requirements.txt
      - run: python -m py_compile cli/kimari_cli.py
      - run: python -m py_compile eval/run_eval.py

  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for f in scripts/linux/*.sh; do
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done
          echo "All shell scripts pass syntax check."

  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python -c "import json; c=json.load(open('config/kimari.profiles.json')); assert 'profiles' in c; assert 'gtx1060' in c['profiles']; assert 'gtx1080' in c['profiles']; assert 'turbo' in c['profiles']; assert 'test' in c['profiles']; assert 'docker' in c['profiles']; print('Config valid.')"
      - run: make validate-config

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python -c "
import json, jsonschema
config = json.load(open('config/kimari.profiles.json'))
schema = json.load(open('config/kimari.profiles.schema.json'))
jsonschema.validate(config, schema)
# Verify default_profile exists in profiles
default = config.get('default_profile', '')
assert default in config.get('profiles', {}), f'default_profile \"{default}\" not found in profiles'
print('Schema validation passed. default_profile=\"' + default + '\" exists in profiles.')
"

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r cli/requirements.txt
      - run: python cli/kimari_cli.py profiles
      - run: python cli/kimari_cli.py doctor --json || true
      - run: python cli/kimari_cli.py start --profile test --dry-run
      - run: python cli/kimari_cli.py start --profile test --model models/test.gguf --host 0.0.0.0 --port 8080 --ctx 2048 --dry-run
      - run: python cli/kimari_cli.py pull --list
      - run: python cli/kimari_cli.py pull test --dry-run
      - run: python cli/kimari_cli.py status --json || true

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          count=$(find docs -name "*.md" | wc -l)
          echo "Found $count documentation files."
          [ "$count" -ge 10 ] || { echo "FAIL: Expected at least 10 doc files"; exit 1; }

  validate-models-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python -c "
import json
registry = json.load(open('config/kimari.models.json'))
assert 'models' in registry, 'Missing models key'
required_ids = {'test', 'recommended', 'qwen3-4b-q4', 'smollm3-3b-q4'}
found_ids = {m['id'] for m in registry['models']}
missing = required_ids - found_ids
assert not missing, f'Missing model IDs: {missing}'
for m in registry['models']:
    for key in ['id', 'display_name', 'url', 'filename', 'target_path', 'size_gb', 'recommended_profile', 'license_note']:
        assert key in m, f'Model {m.get(\"id\", \"?\")} missing key: {key}'
    assert m['filename'].endswith('.gguf'), f'Model {m[\"id\"]} filename does not end with .gguf'
print(f'Models registry valid: {len(registry[\"models\"])} models registered.')
"
